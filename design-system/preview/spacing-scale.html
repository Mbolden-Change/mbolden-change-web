<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-white);font-family:var(--font-body);}
  .wrap{padding:20px 24px;}
  .meta{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700;margin-bottom:14px;}
  .row{display:flex;align-items:flex-end;gap:16px;}
  .step{display:flex;flex-direction:column;align-items:flex-start;gap:6px;}
  .bar{background:var(--brand-black);height:24px;}
  .tag{font-size:10px;font-family:ui-monospace,Menlo,monospace;color:var(--fg-1);font-weight:700;}
  .val{font-size:10px;color:var(--fg-muted);}
</style></head>
<body><div class="wrap">
  <div class="meta">Spacing scale · xs → 3xl</div>
  <div class="row">
    <div class="step"><div class="bar" style="width:4px;"></div><div class="tag">xs</div><div class="val">4</div></div>
    <div class="step"><div class="bar" style="width:8px;"></div><div class="tag">sm</div><div class="val">8</div></div>
    <div class="step"><div class="bar" style="width:16px;"></div><div class="tag">md</div><div class="val">16</div></div>
    <div class="step"><div class="bar" style="width:24px;"></div><div class="tag">lg</div><div class="val">24</div></div>
    <div class="step"><div class="bar" style="width:32px;"></div><div class="tag">xl</div><div class="val">32</div></div>
    <div class="step"><div class="bar" style="width:48px;background:var(--brand-aqua-teal);"></div><div class="tag">2xl</div><div class="val">48</div></div>
    <div class="step"><div class="bar" style="width:80px;background:var(--brand-aqua-teal);"></div><div class="tag">3xl</div><div class="val">80</div></div>
  </div>
</div></body></html>
