<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-aqua-teal);font-family:var(--font-body);}
  .wrap{padding:22px 24px;color:#fff;}
  .quote-block{position:relative;padding:28px 26px 22px 72px;background:#fff;border-radius:16px;color:var(--brand-black);max-width:560px;box-shadow:var(--shadow-card);}
  .quote-mark{position:absolute;top:-14px;left:14px;width:46px;transform:rotate(-12deg);}
  .quote{font-size:17px;line-height:1.45;font-weight:500;color:var(--brand-fuchsia);margin:0;}
  .credit{margin-top:16px;font-size:13px;color:rgba(255,255,255,0.95);}
  .credit strong{display:block;font-weight:700;font-size:15px;}
</style></head>
<body><div class="wrap">
  <div class="quote-block">
    <img class="quote-mark" src="../assets/quote-fuchsia.png" alt=""/>
    <p class="quote">Partnership with mBOLDen Change shifted how we think about who holds the knowledge — and who should hold the dollars.</p>
  </div>
  <div class="credit"><strong>Jamila Patterson</strong>Executive Director · Oakland Partner Coalition</div>
</div></body></html>
