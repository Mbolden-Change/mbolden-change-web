<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-white);font-family:var(--font-body);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
  .meta{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700;}
  .eb{font-size:12px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;color:var(--fg-1);}
  .eb.soft{color:var(--fg-muted);}
  .tag{display:inline-flex;align-items:center;padding:6px 14px;background:var(--bg-warm);color:var(--fg-1);border:1px solid var(--border);border-radius:4px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;}
  .code{font-size:11px;color:var(--fg-muted);font-family:ui-monospace,Menlo,monospace;}
</style></head>
<body><div class="wrap">
  <div class="meta">Eyebrow · 12px · 0.12em tracking</div>
  <div class="eb">CASE STUDY · SYSTEMS CHANGE</div>
  <div class="eb soft">READ TIME · 8 MIN</div>
  <div class="meta" style="margin-top:6px;">Info tag · beige pill · 0.05em tracking</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <span class="tag">POLICY BRIEF</span>
    <span class="tag">2024 REPORT</span>
    <span class="tag">STATEMENT</span>
  </div>
  <div class="code">--text-eyebrow-size · --text-eyebrow-track</div>
</div></body></html>
