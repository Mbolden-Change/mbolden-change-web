<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:rgb(var(--brand-creamy-beige-rgb) / 0.2);font-family:var(--font-body);}
  .wrap{padding:20px 24px;}
  .meta{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700;margin-bottom:14px;}
  /* Mini page example showing vertical rhythm */
  .page{background:#fff;border:1px solid var(--border);border-radius:12px;padding:0;overflow:hidden;max-width:620px;}
  .hero{padding:40px 28px 28px;background:var(--gradient-hero-bg);}
  .eb{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;color:var(--brand-fuchsia);margin-bottom:12px;}
  h2{font-family:var(--font-headline);font-weight:700;font-size:32px;line-height:1.15;letter-spacing:-0.3px;margin:0 0 14px;color:var(--brand-black);}
  p{margin:0 0 24px;line-height:1.6;font-size:14px;color:rgba(0,0,0,.85);}
  .bar{height:2px;background:var(--brand-black);width:48px;margin-bottom:20px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:28px;border-top:1px solid var(--border);background:#fff;}
  .cell{background:var(--bg-warm);border-radius:8px;padding:16px;font-size:13px;font-weight:600;}
</style></head>
<body><div class="wrap">
  <div class="meta">Vertical rhythm · section padding, stacks, gutters</div>
  <div class="page">
    <div class="hero">
      <div class="bar"></div>
      <div class="eb">OUR WORK</div>
      <h2>Systems change, not single programs.</h2>
      <p>We co-create solutions with partners who lead the initiatives that matter most to their communities.</p>
    </div>
    <div class="grid2">
      <div class="cell">24px gutter</div>
      <div class="cell">24px gutter</div>
    </div>
  </div>
</div></body></html>
