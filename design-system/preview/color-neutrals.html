<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-white);font-family:var(--font-body);}
  .wrap{padding:20px 24px;}
  .row{display:flex;gap:10px;}
  .sw{width:104px;height:104px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;box-sizing:border-box;font-size:10px;font-weight:600;line-height:1.25;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08);}
  .hex{opacity:.7;font-weight:500;margin-top:2px;}
  .meta{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700;margin-bottom:10px;}
</style></head>
<body><div class="wrap">
  <div class="meta">Neutrals · surfaces, dividers, muted text</div>
  <div class="row">
    <div class="sw" style="background:var(--brand-white);color:#000;">White<div class="hex">#FFFFFF</div></div>
    <div class="sw" style="background:rgb(var(--brand-creamy-beige-rgb) / 0.2);color:#000;">Page BG<div class="hex">beige 20%</div></div>
    <div class="sw" style="background:var(--brand-light-gray);color:#000;">Light Gray<div class="hex">#E2E2E2</div></div>
    <div class="sw" style="background:var(--brand-ink-soft);color:#000;">Soft Gray<div class="hex">#CCCCCC</div></div>
    <div class="sw" style="background:var(--brand-ink-muted);color:#fff;">Muted<div class="hex">#888888</div></div>
    <div class="sw" style="background:var(--brand-black);color:#fff;">Ink<div class="hex">#000000</div></div>
  </div>
</div></body></html>
