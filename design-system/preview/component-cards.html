<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:rgb(var(--brand-creamy-beige-rgb) / 0.2);font-family:var(--font-body);}
  .wrap{padding:20px 24px;display:flex;gap:18px;align-items:stretch;}
  /* Default card from CardGallery */
  .card{display:flex;flex-direction:column;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-card);padding:18px 22px 20px;flex:1;}
  .card .img{background:linear-gradient(135deg, #f8efe0, #e2e2e2);border-radius:12px;height:80px;margin-bottom:14px;}
  .card h3{font-family:var(--font-headline);font-size:18px;font-weight:700;color:#000;margin:0 0 8px;letter-spacing:-0.3px;}
  .card p{font-size:13px;line-height:1.55;color:#000;margin:0 0 14px;}
  .card a{margin-top:auto;align-self:flex-start;padding:7px 16px;border:2px solid var(--brand-aqua-teal);border-radius:50px;font-size:12px;font-weight:500;color:#000;text-decoration:none;}
  /* Pillar card — fuchsia border */
  .pillar{border:1px solid var(--brand-fuchsia);box-shadow:0 4px 12px var(--border);}
  .pillar h3{text-align:center;}
  .pillar .img{background:linear-gradient(135deg, #b22f93 0%, #0091ad 100%);height:80px;margin:0 auto 14px;width:60%;border-radius:12px;}
</style></head>
<body><div class="wrap">
  <div class="card">
    <div class="img"></div>
    <h3>Direct Cash Support</h3>
    <p>Flexible dollars in the hands of families who need them most.</p>
    <a>Read more</a>
  </div>
  <div class="card pillar">
    <div class="img"></div>
    <h3>Partner-Led Change</h3>
    <p>Co-created solutions launched by community leaders.</p>
    <a>Read more</a>
  </div>
</div></body></html>
