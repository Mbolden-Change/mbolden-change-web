<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-white);font-family:var(--font-body);}
  .wrap{padding:20px 24px;}
  .meta{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700;margin-bottom:14px;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .pair{display:flex;gap:10px;align-items:center;padding:10px 14px;border-radius:8px;font-weight:600;}
  .ratio{margin-left:auto;font-family:ui-monospace,Menlo,monospace;font-size:11px;opacity:.85;}
</style></head>
<body><div class="wrap">
  <div class="meta">Contrast pairings · text over brand colors</div>
  <div class="row">
    <div class="pair" style="background:#000;color:#fff;">White on Black <span class="ratio">21 : 1 · AAA</span></div>
    <div class="pair" style="background:#fad826;color:#000;">Black on Yellow <span class="ratio">15.4 : 1 · AAA</span></div>
    <div class="pair" style="background:#0091ad;color:#fff;">White on Aqua <span class="ratio">4.7 : 1 · AA</span></div>
    <div class="pair" style="background:#b22f93;color:#fff;">White on Fuchsia <span class="ratio">5.5 : 1 · AA</span></div>
    <div class="pair" style="background:#f8efe0;color:#000;">Black on Beige <span class="ratio">19 : 1 · AAA</span></div>
    <div class="pair" style="background:#fff;color:#0091ad;border:1px solid #e2e2e2;">Aqua on White (link) <span class="ratio">4.5 : 1 · AA</span></div>
  </div>
</div></body></html>
