<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-white);font-family:var(--font-body);}
  .wrap{padding:20px 24px;}
  .row{display:flex;gap:10px;align-items:stretch;}
  .sw{width:104px;height:104px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;box-sizing:border-box;font-size:10px;font-weight:600;line-height:1.25;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06);}
  .hex{opacity:.7;font-weight:500;margin-top:2px;}
  .meta{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700;margin-bottom:10px;}
</style></head>
<body><div class="wrap">
  <div class="meta">Primary palette · signature brand colors</div>
  <div class="row">
    <div class="sw" style="background:var(--brand-black);color:#fff;">Black<div class="hex">#000000</div></div>
    <div class="sw" style="background:var(--brand-warm-yellow);color:#000;">Warm Yellow<div class="hex">#FAD826</div></div>
    <div class="sw" style="background:var(--brand-aqua-teal);color:#fff;">Aqua Teal<div class="hex">#0091AD</div></div>
    <div class="sw" style="background:var(--brand-fuchsia);color:#fff;">Fuchsia<div class="hex">#B22F93</div></div>
    <div class="sw" style="background:var(--brand-creamy-beige);color:#000;">Creamy Beige<div class="hex">#F8EFE0</div></div>
  </div>
</div></body></html>
