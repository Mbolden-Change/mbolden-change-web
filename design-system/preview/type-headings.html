<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-white);font-family:var(--font-body);}
  .wrap{padding:20px 24px;}
  .meta{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700;margin-bottom:12px;}
  .spec{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid var(--border);}
  .spec:last-child{border-bottom:none;}
  .label{width:90px;font-size:11px;color:var(--fg-muted);font-family:ui-monospace,Menlo,monospace;flex-shrink:0;}
  .sample{flex:1;line-height:1.1;}
</style></head>
<body><div class="wrap">
  <div class="meta">Headings · Archivo Narrow 700</div>
  <div class="spec"><div class="label">h3 · 24/120</div><div class="sample h3">Our four pillars of change</div></div>
  <div class="spec"><div class="label">h4 · 20/120</div><div class="sample h4">Partner-led initiatives</div></div>
  <div class="spec"><div class="label">h5 · 18/120</div><div class="sample h5">Community of practice</div></div>
  <div class="spec"><div class="label">h6 · 16/120</div><div class="sample h6">Read the full report</div></div>
</div></body></html>
