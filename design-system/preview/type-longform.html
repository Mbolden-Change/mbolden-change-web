<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-white);font-family:var(--font-body);}
  .wrap{padding:20px 24px;max-width:640px;}
  .meta{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700;margin-bottom:14px;}
  /* Long-form scale from PortableTextComponent */
  .h-1{font-family:var(--font-headline);font-size:48px;line-height:1.05;font-weight:500;letter-spacing:-1.5px;margin:0 0 8px;}
  .h-2{font-family:var(--font-headline);font-size:36px;line-height:1.08;font-weight:500;letter-spacing:-1.2px;margin:0 0 6px;}
  .h-3{font-family:var(--font-headline);font-size:28px;line-height:1.1;font-weight:600;letter-spacing:-0.8px;margin:0;}
  .cap{font-size:10px;color:var(--fg-muted);font-family:ui-monospace,Menlo,monospace;margin:2px 0 10px;}
</style></head>
<body><div class="wrap">
  <div class="meta">Long-form article headlines · PortableText scale</div>
  <div class="h-1">A new kind of partner.</div>
  <div class="cap">headline-1 · 72px / 500 · editorial hero</div>
  <div class="h-2">What changed in 2024</div>
  <div class="cap">headline-2 · 64px / 500</div>
  <div class="h-3">From programs to systems</div>
  <div class="cap">headline-3 · 48px / 600</div>
</div></body></html>
