<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-white);font-family:var(--font-body);}
  .wrap{padding:20px 24px;}
  .meta{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700;margin-bottom:12px;}
  .spec{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px solid var(--border);}
  .spec:last-child{border-bottom:none;}
  .label{width:90px;font-size:11px;color:var(--fg-muted);font-family:ui-monospace,Menlo,monospace;flex-shrink:0;}
  .sample{flex:1;line-height:1;}
</style></head>
<body><div class="wrap">
  <div class="meta">Display · Archivo Narrow 700 · hero / marketing</div>
  <div class="spec"><div class="label">hero-xl</div><div class="sample" style="font-family:var(--font-headline);font-weight:800;font-size:64px;letter-spacing:-0.5px;">Bold Change.</div></div>
  <div class="spec"><div class="label">h1 · 48/120</div><div class="sample h1">mBOLDen the work</div></div>
  <div class="spec"><div class="label">h2 · 36/120</div><div class="sample h2">Systems-level change</div></div>
</div></body></html>
