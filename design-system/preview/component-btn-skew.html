<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-body);}
  .wrap{padding:22px 24px;display:flex;flex-direction:column;gap:16px;}
  .meta{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700;}
  .row{display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
  /* Signature skewed parallelogram button */
  .btn-skew{
    position:relative;display:inline-block;
    background:var(--brand-black);color:var(--brand-white);
    padding:10px 22px;font-size:18px;font-weight:600;
    font-family:var(--font-body);
    transform:skew(-10.25deg);
    clip-path:polygon(0% 10%, 100% 0%, 100% 90%, 0% 100%);
    text-decoration:none;cursor:pointer;border:none;
    box-shadow:0 4px 5px rgba(0,0,0,0.4);
    overflow:hidden;
    z-index:1;
    transition:color 300ms cubic-bezier(0.45,0.05,0.55,0.95);
  }
  .btn-skew::before{
    content:'';
    position:absolute;
    inset:0;
    background:var(--brand-warm-yellow);
    transform:scaleX(0);
    transform-origin:left;
    transition:transform .4s ease-in-out;
    z-index:-1;
  }
  .btn-skew:hover{
    color:var(--brand-black);
  }
  .btn-skew:hover::before{
    transform:scaleX(1);
  }
  .btn-skew.yellow{background:var(--brand-warm-yellow);color:#000;}
  .btn-skew.fuchsia{background:var(--brand-fuchsia);color:#fff;}
  .label{font-size:11px;color:var(--fg-muted);font-family:ui-monospace,Menlo,monospace;margin-top:8px;}
</style></head>
<body><div class="wrap">
  <div class="meta">Primary CTA · skewed parallelogram · header donate fill-sweep</div>
  <div class="row">
    <a class="btn-skew">Donate</a>
    <a class="btn-skew yellow">Sign up for our Newsletter</a>
    <a class="btn-skew fuchsia">Hover state</a>
  </div>
  <div class="label">Hover behavior matches header donate button: warm-yellow fill sweeps left → right.</div>
</div></body></html>
